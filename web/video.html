<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .video-wrapper {
            width: 100%;
            max-width: 900px;
            padding: 20px;
        }
        video {
            width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div class="video-wrapper">
        <video controls poster="https://customer-c4cwl9vbm74g1nh9.cloudflarestream.com/771877548990fbe339ffe8845f35325c/thumbnails/thumbnail.jpg">
            <source src="https://customer-c4cwl9vbm74g1nh9.cloudflarestream.com/771877548990fbe339ffe8845f35325c/manifest/video.m3u8" type="application/vnd.apple.mpegurl">
            Seu navegador nao suporta reprodução de video HLS.
        </video>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var video = document.querySelector('video');
            var videoSrc = video.querySelector('source').src;
            
            if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // Suporte nativo HLS (Safari)
                video.src = videoSrc;
            } else if (window.Hls && window.Hls.isSupported()) {
                // Usar HLS.js para outros navegadores
                var hls = new window.Hls();
                hls.loadSource(videoSrc);
                hls.attachMedia(video);
                hls.on(window.Hls.Events.MANIFEST_PARSED, function() {
                    console.log('Video pronto para reprodução');
                });
            } else {
                console.error('HLS nao suportado neste navegador');
            }
        });
    </script>
</body>
</html>
